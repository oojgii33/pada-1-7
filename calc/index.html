<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box">
      <input type="text" readonly class="deed" id="delgets" />
      <div class="dood">
        <button onclick="cleard()" class="dotor">AC</button>
        <button onclick="touch('*')" class="dotor">x</button>
        <button onclick="touch('/')" class="dotor">/</button>
        <button onclick="dele()" class="dotor">
          <div class="del">
            <img
              src="https://cdn-icons-png.flaticon.com/128/11761/11761155.png"
              alt="x"
            />
          </div>
        </button>
        <button onclick="touch('1')" class="dotor">1</button>
        <button onclick="touch('2')" class="dotor">2</button>
        <button onclick="touch('3')" class="dotor">3</button>
        <button onclick="touch('+')" class="dotor">+</button>
        <button onclick="touch('4')" class="dotor">4</button>
        <button onclick="touch('5')" class="dotor">5</button>
        <button onclick="touch('6')" class="dotor">6</button>
        <button onclick="touch('-')" class="dotor">-</button>
        <button onclick="touch('7')" class="dotor">7</button>
        <button onclick="touch('8')" class="dotor">8</button>
        <button onclick="touch('9')" class="dotor">9</button>
        <button onclick="tootsool()" class="dotor" id="tentsuu">=</button>
        <button onclick="touch('%')" class="dotor">%</button>
        <button onclick="touch('0')" class="dotor">0</button>
        <button onclick="touch('.')" class="dotor">.</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
